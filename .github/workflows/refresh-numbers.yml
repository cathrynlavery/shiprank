name: Refresh numbers

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: refresh-numbers
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check refresh window
        id: refresh-window
        if: github.event_name == 'schedule'
        run: |
          local_hour="$(TZ=America/Chicago date +%H)"
          case "$local_hour" in
            00|08|10|12|14|16|18|20|22)
              echo "Refreshing for Central hour $local_hour"
              echo "run_refresh=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Skipping Central hour $local_hour"
              echo "run_refresh=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Refresh stats
        if: github.event_name == 'workflow_dispatch' || steps.refresh-window.outputs.run_refresh == 'true'
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          REFRESH_URL: ${{ vars.SHIPRANK_REFRESH_URL || 'https://shiprank.dev/api/cron/refresh' }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "Missing required repository secret: CRON_SECRET" >&2
            exit 1
          fi

          curl --fail-with-body --show-error --silent \
            --request GET \
            --header "Authorization: Bearer $CRON_SECRET" \
            "$REFRESH_URL"
